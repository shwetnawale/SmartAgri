services:
  - type: web
    name: agri-logistic-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: agri_logistics
      - key: API_KEY
        sync: false
      - key: ENABLE_API_KEY_AUTH
        value: "1"
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: DEBUG
        value: "0"

